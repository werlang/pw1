<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script type="module" src="script.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="box">
        <h1>Cadastro de Tarefas</h1>
        <span>Tarefa</span>
        <input id="task-input">
        <button id="task-button">Cadastrar Tarefa</button>
        <button id="clear-button">Limpar Lista</button>
    </div>
    <div class="box">
        <h1>Tarefas</h1>
        <ul id="task-list"></ul>
    </div>
    <div class="box">
        <h1>Informações</h1>
        <div>Total de Tarefas: <span id="total-task">0</span></div>
        <div>Última Tarefa: <span id="last-task">-</span></div>
        <div>Lista por extenso: <span id="join-task">-</span></div>
    </div>
</body>
</html>
