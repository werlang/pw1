<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Cards</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <main class="container">
        <h1>Galeria de Cards</h1>

        <section class="painel formulario">
            <input id="input-titulo" type="text" placeholder="Título do card">
            <textarea id="input-descricao" rows="4" placeholder="Descrição do card"></textarea>
            <button id="btn-criar" type="button">Criar card</button>
            <p id="contador">0 card(s)</p>
        </section>

        <section id="galeria" class="galeria"></section>
    </main>
</body>
</html>
