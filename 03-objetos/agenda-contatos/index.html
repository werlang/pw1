<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda de Contatos</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <main class="container">
        <h1>Agenda de Contatos</h1>
        <p class="intro">Cadastre e pesquise contatos usando array de objetos.</p>

        <section class="painel formulario">
            <input id="input-nome" type="text" placeholder="Nome">
            <input id="input-telefone" type="text" placeholder="Telefone">
            <input id="input-cidade" type="text" placeholder="Cidade">
            <button id="btn-cadastrar" type="button">Cadastrar contato</button>
            <p id="mensagem" class="mensagem"></p>
        </section>

        <section class="painel busca">
            <input id="input-busca" type="text" placeholder="Buscar por nome">
            <p id="resultado-busca" class="resultado"></p>
        </section>

        <section class="painel lista">
            <h2>Contatos cadastrados</h2>
            <div id="lista-contatos"></div>
        </section>
    </main>
</body>
</html>
